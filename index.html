<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Condução PT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Estudo de condução</p>
        <h1>Quiz Condução PT</h1>
        <p class="subtitle">Responde como num exame, revê as erradas e acompanha o teu progresso.</p>
      </div>
      <button id="resetProgressBtn" class="ghost-button" type="button">Reiniciar</button>
    </header>

    <section id="homeView" class="view active">
      <div class="summary-card">
        <span>Total certas</span>
        <strong id="totalMastered">0/0</strong>
        <div class="progress-track" aria-hidden="true">
          <div id="totalProgressBar" class="progress-fill"></div>
        </div>
      </div>

      <div class="action-row">
        <button id="randomModeBtn" class="primary-button" type="button">Modo aleatório</button>
        <button id="reviewWrongBtn" class="secondary-button" type="button">Rever erradas</button>
      </div>

      <h2>Grupos de estudo</h2>
      <div id="groupsContainer" class="groups-grid"></div>
    </section>

    <section id="studyView" class="view">
      <nav class="study-nav">
        <button id="backHomeBtn" class="ghost-button" type="button">← Início</button>
        <span id="studyModeLabel">Grupo</span>
      </nav>

      <div class="card-status">
        <span id="cardCounter">0/0</span>
        <span id="cardStats">0 certas · 0 erradas · 0 tentativas</span>
      </div>

      <article class="flashcard" aria-live="polite">
        <p id="cardGroupLabel" class="card-group-label"></p>
        <h2 id="questionText">Pergunta</h2>
        <div id="optionsContainer" class="options-grid"></div>
        <div id="feedbackBox" class="feedback-box hidden" aria-live="polite">
          <strong id="feedbackTitle"></strong>
          <p id="explanationText"></p>
        </div>
      </article>

      <div class="study-actions">
        <button id="nextQuestionBtn" class="primary-button hidden" type="button">Próxima pergunta</button>
      </div>

      <p id="emptyState" class="empty-state hidden">Não há perguntas para rever neste modo.</p>
    </section>
  </main>

  <script src="flashcards.js"></script>
  <script src="script.js"></script>
</body>
</html>
